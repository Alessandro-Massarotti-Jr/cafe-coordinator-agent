services:
  backend:
    build:
      context: ./backend
      dockerfile: ./.docker/Dockerfile.dev
    command: "/home/node/app/.docker/start-dev.sh"
    volumes:
      - ./backend:/home/node/app:cached
    environment:
      - PORT=3000
      - OLLAMA_URL=http://ollama:11434/api
    expose:
      - "3000"
    depends_on:
      - ollama
      - products-mcp

  products-mcp:
    build:
      context: ./products-mcp
      dockerfile: ./.docker/Dockerfile.dev
    command: "/home/node/app/.docker/start-dev.sh"
    volumes:
      - ./products-mcp:/home/node/app:cached
    environment:
      - PORT=3001
    expose:
      - "3001"

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/index.css:/usr/share/nginx/html/index.css:ro
      - ./frontend/index.js:/usr/share/nginx/html/index.js:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:0.19.0-rc0
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
      ollama serve &
      sleep 5 &&
      ollama pull gemma4 &&
      ollama pull embeddinggemma &&
      wait
      "
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  ollama_data:
  qdrant_data:
